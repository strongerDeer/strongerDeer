      - paragraph [ref=f7e101]: 실사용자(CrUX) 지표 화면입니다. LCP 1.44s·INP 88ms·CLS 0을 정상 판정하고, LCP를 서버 응답(TTFB)·이미지 로드·다운로드·렌더 지연으로 분해해 어디를 개선해야 LCP가 더 빨라지는지 근거를 만들었습니다. 우측 추세 차트로 28일 롤링 윈도우의 회귀 여부를 함께 봅니다.
