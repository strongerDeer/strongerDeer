      - paragraph [ref=f7e98]: Shop 품질 모니터링 화면입니다. 동일 배포본(sameDeployment) 재측정 여부, 직전 대비 이미지·번들·Perf 변화, 회귀/노이즈 구분, 주간 자동 분석 코멘트를 한 화면에서 확인합니다. 이 화면에는 회사 매출·회원 데이터가 아니라 프론트엔드 품질 지표만 담겨 있습니다.
