        - listitem [ref=f7e47]: 오픈 시점이 다른 회차를 오픈 후 7/14/30일 기준 상대기간으로 정규화해 공정한 비교 뷰 구현
        - listitem [ref=f7e48]: QR 기반 오프라인 유입 추적, GA4·Search Console·Admin 데이터를 통합하고 식별률·커버리지를 노출해 데이터 신뢰도 표시
        - listitem [ref=f7e49]: 카페24(B2C) 외부 채널 매출을 대시보드에 통합해 온라인·오프라인·외부 채널 성과를 한 화면에서 비교
        - listitem [ref=f7e50]: Admin 통계 API 토큰을 자동 갱신하도록 구성해 반복 조회 시 인증 만료로 집계가 끊기지 않도록 처리
        - listitem [ref=f7e51]: KST 기준 날짜 집계, MAU 월별 합산 과대집계, 변화율 오류 등 실데이터 정합성 이슈를 반복 검증하고 순방문(MAU) 과대집계를 제거
