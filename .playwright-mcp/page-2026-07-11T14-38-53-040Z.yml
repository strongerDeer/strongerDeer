      - heading "실사용자 지표와 테스트 환경 점수의 신호를 분리하는 문제" [level=4] [ref=f7e88]
      - paragraph [ref=f7e89]: Lighthouse lab LCP는 네트워크 스로틀 조건에서 이미지 전송량에 크게 흔들려, 실사용자 CrUX LCP가 통과해도 매주 빨간불이 켜질 수 있었습니다. 그래서 Shop 품질 모니터링에서는 lab LCP를 참고값으로 두고, 합격/불합격 판단은 field LCP/INP/CLS 중심으로 분리했습니다.
      - list [ref=f7e90]:
        - listitem [ref=f7e91]: "field LCP: Core Web Vitals 기준 2.5s/4.0s"
        - listitem [ref=f7e92]: "INP: 200ms/500ms"
        - listitem [ref=f7e93]: "CLS: 0.1/0.25"
        - listitem [ref=f7e94]: lab TBT와 bundle/image weight는 회귀 감지용 보조 신호로 사용
      - paragraph [ref=f7e95]: 이 기준으로 “실제 사용자 경험이 나빠진 것”과 “측정 환경 때문에 흔들린 것”을 구분하고 개선 우선순위를 정할 수 있었습니다.
