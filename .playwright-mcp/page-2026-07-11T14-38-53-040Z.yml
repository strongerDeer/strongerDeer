      - heading "문제" [level=3] [ref=f7e38]
      - paragraph [ref=f7e39]: 신규 오픈한 NOVERA Shop에는 이벤트 페이지 성과를 판단할 KPI, 오픈 시점이 다른 회차 간 비교 기준, 오프라인 유입 추적 수단이 없었습니다. 동시에 Shop 운영 품질은 배포 후 개별 이슈로 발견되는 경우가 많았고, 성능·접근성·SEO·이미지 전송량이 실제 사용자 경험에 어떤 영향을 주는지 한 곳에서 보기 어려웠습니다.
      - paragraph [ref=f7e40]: 문제는 두 갈래였습니다. 사업팀에는 이벤트가 목표에 도달하고 있는지 빠르게 판단할 기준이 필요했고, 프론트엔드 입장에서는 Shop의 품질 회귀를 배포 이후가 아니라 운영 중에 지속적으로 감지할 기준이 필요했습니다.
      - heading "역할" [level=3] [ref=f7e41]
      - paragraph [ref=f7e42]: 측정 필요성을 먼저 제안하고, 항목 정의부터 데이터 연결, 화면 구성, 배포까지 프론트엔드 구현을 주도했습니다. 이벤트 성과 분석은 사업팀과 KPI 기준을 합의하고 백엔드와 GA4·어드민 데이터 연동을 협의했으며, Shop 품질 모니터링은 프론트엔드 지표와 주간 점검 기준을 직접 정리했습니다.
      - heading "해결" [level=3] [ref=f7e43]
      - heading "이벤트 성과 분석 대시보드" [level=4] [ref=f7e44]
