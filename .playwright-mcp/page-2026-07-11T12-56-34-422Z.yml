      - heading "SEO metadata 병합에서 robots가 의도치 않게 풀리는 문제" [level=4] [ref=f1e83]
      - paragraph [ref=f1e84]:
        - text: Next.js metadata 병합 과정에서
        - code [ref=f1e85]: "robots: undefined"
        - text: 가 하위 페이지에 포함되면 상위 layout의
        - code [ref=f1e86]: noindex
        - text: 정책이 덮이는 문제가 있었습니다. 비기본 locale과 민감 페이지 색인 차단이 중요했기 때문에,
        - code [ref=f1e87]: robots
        - text: 를 명시한 경우에만 metadata 객체에 포함하도록 방어했습니다.
      - figure [ref=f1e88]:
