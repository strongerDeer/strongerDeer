      - heading "운영 어드민의 다중 처리와 캐시 무효화" [level=4] [ref=f1e97]
      - paragraph [ref=f1e98]:
        - text: 취소·반품·구매확정 처리는 한 주문 안의 여러 상품 상태가 서로 다르게 움직입니다. 운영자가 여러 건을 선택해 처리할 수 있도록 선택 상태와 상세 조회를 분리하고, 선택된 id 목록은
        - code [ref=f1e99]: useQueries
        - text: 로 병렬 조회했습니다. 처리 mutation 이후에는 주문 도메인 query를 한 번에 무효화해 목록·상세·대시보드의 상태가 어긋나지 않도록 했습니다.
      - figure [ref=f1e100]:
        - code [ref=f1e102]:
          - generic [ref=f1e103]: "useQueries({"
          - generic [ref=f1e104]: "queries: ids.map((id) => ({"
          - generic [ref=f1e105]: "queryKey: ['order', 'cancel', id],"
          - generic [ref=f1e106]: "queryFn: () => getOrderCancel(id),"
          - generic [ref=f1e107]: "enabled: session.status === 'authenticated',"
          - generic [ref=f1e108]: "})),"
          - generic [ref=f1e109]: "});"
      - heading "결과" [level=3] [ref=f1e110]
      - list [ref=f1e111]:
        - listitem [ref=f1e112]:
          - text: 구글·카카오 간편가입 도입 후 7일간 신규 가입자의
          - strong [ref=f1e113]: 79.4%가 SNS 간편가입을 선택
          - text: (어드민 가입 통계 기준)
        - listitem [ref=f1e114]:
          - text: 메인 페이지 이미지 전송량 약 6.6MB → 381KB,
          - strong [ref=f1e115]: 94% 경량화
        - listitem [ref=f1e116]:
          - text: Pretendard 3종 전체 로드(약 2.15MB)를 페이지당 필요 글자 조각만 내려받는
          - strong [ref=f1e117]: 다이나믹 서브셋(페이지당 ~320KB)
          - text: 방식으로 전환하고, GA·픽셀 등 마케팅 스크립트를 지연 로드해 초기 렌더 부담을 줄임
        - listitem [ref=f1e118]: 주문·배송·반품·클레임·이벤트 매출 관리 화면을 정리해 운영자가 반복 확인하던 업무 흐름을 줄임
        - listitem [ref=f1e119]: SPHERE 이벤트를 1회차(포토카드)부터 다회차(덕력고사 퀴즈·호흡 투표)까지 확장 개발하며, 오픈 전 가드·URL 진행 복원·전용 OG 정비 등 캠페인 운영에 필요한 프론트엔드 기반을 함께 정리함
      - paragraph [ref=f1e120]:
        - img "SPHERE 호흡 투표 이벤트 랜딩 — 발동 카운터·투표·공유·상품 연결" [ref=f1e121]
      - paragraph [ref=f1e122]: 공개 캠페인 랜딩 예시입니다. 심볼을 눌러 반응을 발동하는 참여형 인터랙션과 누적 발동 카운터, 투표·공유·상품보기 연결을 한 화면에서 처리합니다. 이런 참여형 이벤트를 회차마다 다른 형식(포토카드·퀴즈·투표)으로 반복 개발했습니다.
      - paragraph [ref=f1e123]: 개선 이후 성능·SEO 상태는 별도 성과·품질 대시보드에서 Core Web Vitals, Lighthouse, 이미지 전송량 기준으로 지속 확인했습니다. 이 상세에서는 화면 흐름과 상태 설계에 집중하고, 측정 체계는 대시보드 프로젝트에서 따로 설명합니다.
      - heading "설계 판단 기준 — 데이터가 없는 초기 단계에서" [level=3] [ref=f1e124]
      - paragraph [ref=f1e125]: 초기 운영 단계라 A/B 테스트나 충분한 사용자 행동 데이터로 개선 효과를 증명하기는 이른 상황이었습니다. 대신 CS 이력, 운영자의 반복 작업 패턴처럼 관찰 가능한 신호를 근거로 아래 세 가지를 우선 판단했습니다.
      - list [ref=f1e126]:
        - listitem [ref=f1e127]:
          - paragraph [ref=f1e128]:
            - strong [ref=f1e129]: 상품별 안내문구 영역 신설
            - text: ": 해외결제, 예약 판매처럼 일반 주문과 조건이 다른 상품은 구매 전 안내가 없으면 결제 후 CS로 이어질 가능성이 높다고 판단해, 상품 상세 화면에 조건을 사전 노출하는 영역을 구조적으로 분리했습니다. 사용자 데이터로 검증하기 전이지만, CS 발생 지점을 사후 대응이 아니라 사전 안내로 옮기는 것을 원칙으로 삼았습니다."
          - paragraph [ref=f1e130]:
            - img "상품 상세(PDP) — 가격·배송 조건과 상품별 안내사항 영역" [ref=f1e131]
          - paragraph [ref=f1e132]:
            - text: 실제 상품 상세 화면입니다. 가격·배송비·무료배송 조건 아래에 별도
            - strong [ref=f1e133]: 안내사항 영역
            - text: 을 두어, 이벤트/응모 상품의 발송 시점·주문 변경 불가·해외 진행 방식 등을 한국어와 영어로 결제 전에 노출합니다.
