      - heading "기술적으로 어려웠던 문제" [level=3] [ref=f1e54]
      - heading "서버 렌더링과 클라이언트 캐시의 경계" [level=4] [ref=f1e55]
      - paragraph [ref=f1e56]: 상품 목록, 상세, 마이페이지는 첫 화면 노출 속도와 이후 상호작용 속도를 모두 고려해야 했습니다. 서버에서 미리 가져와도 되는 데이터와 클라이언트에서 사용자 행동에 따라 갱신되어야 하는 데이터를 분리하고, TanStack Query의 prefetch/dehydrate 패턴으로 서버 데이터와 클라이언트 캐시를 연결했습니다.
      - figure [ref=f1e57]:
        - code [ref=f1e59]:
          - generic [ref=f1e60]: "const queryClient = new QueryClient({"
          - generic [ref=f1e61]: "defaultOptions: {"
          - generic [ref=f1e62]: "queries: {"
          - generic [ref=f1e63]: "retry: false,"
          - generic [ref=f1e64]: "staleTime: 1000 * 60 * 5,"
          - generic [ref=f1e65]: "refetchOnWindowFocus: false,"
          - generic [ref=f1e66]: "refetchOnMount: false,"
          - generic [ref=f1e67]: "refetchOnReconnect: false,"
          - generic [ref=f1e68]: "},"
          - generic [ref=f1e69]: "},"
          - generic [ref=f1e70]: "});"
      - paragraph [ref=f1e71]: 이 구조로 초기 렌더링은 서버 데이터를 활용하고, 장바구니·주문·클레임처럼 사용자 상태가 바뀌는 화면은 mutation 이후 관련 query를 무효화하는 방식으로 일관성을 맞췄습니다.
      - heading "무한 스크롤에서 필터 후 빈 화면이 생기는 문제" [level=4] [ref=f1e72]
      - paragraph [ref=f1e73]: 목록 데이터에 클라이언트 필터가 추가되면, 현재 로드된 페이지 안에서는 결과가 0개지만 다음 페이지에는 결과가 있는 상황이 생깁니다. 단순히 빈 화면을 노출하면 사용자는 데이터가 없다고 오해합니다. 그래서 필터 결과가 비었고 다음 페이지가 남아 있으며 현재 fetch 중이 아닐 때만 다음 페이지를 자동으로 한 번 더 가져오도록 제어했습니다.
      - list [ref=f1e74]:
        - listitem [ref=f1e75]:
          - code [ref=f1e76]: loadedPageCount
