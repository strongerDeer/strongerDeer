    - generic [ref=f1e29]:
      - heading "이 프로젝트를 보는 방법" [level=3] [ref=f1e30]
      - paragraph [ref=f1e31]: NOVERA Shop은 주문·클레임·고객 정보가 포함된 화면 캡처가 제한적인 회사 프로젝트입니다. 따라서 포트폴리오에서는 로그인 없이 접근 가능한 공개 화면(상품 탐색·상품 상세·캠페인 랜딩)만 일부 보여주고, 나머지는 신규 커머스에서 사용자가 헷갈리기 쉬운 상태와 운영자가 반복 처리하던 업무를 어떻게 화면 흐름으로 정리했는지에 집중했습니다.
      - paragraph [ref=f1e32]: 2026년 4월 오픈 이후 별도 대규모 마케팅 없이 MAU 최대 3,436명을 기록한 운영 쇼핑몰 프로젝트이며, 이 상세에서는 매출 같은 내부 지표는 제외하고 공개 가능한 사용자 규모와 프론트엔드 개선 범위만 다룹니다.
