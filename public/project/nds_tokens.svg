<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">NDS 색상 토큰 3계층 구조</title>
  <desc id="desc">Primitive 원시 값이 Semantic 용도 토큰으로, 다시 Brand 브랜드 토큰으로 참조되며, 컴포넌트는 Semantic 토큰을 우선 소비하는 구조</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f5ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0 0l8 4-8 4z" fill="#7967d8"/>
    </marker>
    <style>
      .title{font:700 25px Pretendard,Arial,sans-serif;fill:#24212f}.label{font:700 18px Pretendard,Arial,sans-serif;fill:#24212f}.sub{font:400 14px Pretendard,Arial,sans-serif;fill:#667085}.code{font:600 13px 'SF Mono',Menlo,monospace;fill:#6654c0}.pill{font:700 13px Pretendard,Arial,sans-serif;fill:#6654c0}.flow{stroke:#7967d8;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="60" y="68" class="title">색상 토큰 3계층 — 값이 아니라 의미를 참조한다</text>

  <!-- Primitive -->
  <g transform="translate(55 120)">
    <rect width="340" height="360" rx="22" fill="#fff" stroke="#e4e7ec"/>
    <rect x="24" y="24" width="118" height="28" rx="14" fill="#eeeaff"/><text x="42" y="43" class="pill">Primitive</text>
    <text x="24" y="86" class="label">원시 값</text>
    <text x="24" y="112" class="sub">브랜드·용도와 무관한 팔레트</text>
    <g transform="translate(24 138)">
      <rect width="26" height="26" rx="7" fill="#6654c0"/><text x="40" y="18" class="code">purple-500  #6654C0</text>
    </g>
    <g transform="translate(24 178)">
      <rect width="26" height="26" rx="7" fill="#9a8ce0"/><text x="40" y="18" class="code">purple-300  #9A8CE0</text>
    </g>
    <g transform="translate(24 218)">
      <rect width="26" height="26" rx="7" fill="#e4342f"/><text x="40" y="18" class="code">red-500     #E4342F</text>
    </g>
    <g transform="translate(24 258)">
      <rect width="26" height="26" rx="7" fill="#111827"/><text x="40" y="18" class="code">gray-900    #111827</text>
    </g>
    <g transform="translate(24 298)">
      <rect width="26" height="26" rx="7" fill="#f3f4f6" stroke="#e4e7ec"/><text x="40" y="18" class="code">gray-100    #F3F4F6</text>
    </g>
  </g>
  <path class="flow" d="M403 300h44"/>

  <!-- Semantic -->
  <g transform="translate(455 120)">
    <rect width="340" height="360" rx="22" fill="#fff" stroke="#ded8ff" stroke-width="2"/>
    <rect x="24" y="24" width="120" height="28" rx="14" fill="#eeeaff"/><text x="42" y="43" class="pill">Semantic</text>
    <text x="24" y="86" class="label">용도 · 의미</text>
    <text x="24" y="112" class="sub">컴포넌트가 우선 소비하는 계층</text>
    <g transform="translate(24 138)">
      <rect width="26" height="26" rx="7" fill="#6654c0"/><text x="40" y="18" class="code">action.primary</text>
    </g>
    <g transform="translate(24 178)">
      <rect width="26" height="26" rx="7" fill="#e4342f"/><text x="40" y="18" class="code">status.danger</text>
    </g>
    <g transform="translate(24 218)">
      <rect width="26" height="26" rx="7" fill="#111827"/><text x="40" y="18" class="code">text.strong</text>
    </g>
    <g transform="translate(24 258)">
      <rect width="26" height="26" rx="7" fill="#f3f4f6" stroke="#e4e7ec"/><text x="40" y="18" class="code">surface.subtle</text>
    </g>
    <text x="24" y="330" class="sub">→ Primitive 값을 이름으로 감싼다</text>
  </g>
  <path class="flow" d="M803 300h44"/>

  <!-- Brand -->
  <g transform="translate(855 120)">
    <rect width="290" height="360" rx="22" fill="#6654c0"/>
    <rect x="24" y="24" width="100" height="28" rx="14" fill="#ffffff" opacity="0.18"/><text x="40" y="43" style="font:700 13px Pretendard,Arial,sans-serif;fill:#fff">Brand</text>
    <text x="24" y="86" style="font:700 18px Pretendard,Arial,sans-serif;fill:#fff">브랜드</text>
    <text x="24" y="112" style="font:400 14px Pretendard,Arial,sans-serif;fill:#e8e3ff">브랜드별로 Semantic을 재지정</text>
    <text x="24" y="164" style="font:600 13px 'SF Mono',Menlo,monospace;fill:#fff">brandA.action = purple</text>
    <text x="24" y="200" style="font:600 13px 'SF Mono',Menlo,monospace;fill:#fff">brandB.action = teal</text>
    <text x="24" y="252" style="font:400 14px Pretendard,Arial,sans-serif;fill:#e8e3ff">멀티브랜드 테마를</text>
    <text x="24" y="276" style="font:400 14px Pretendard,Arial,sans-serif;fill:#e8e3ff">같은 컴포넌트로 지원</text>
  </g>
</svg>
