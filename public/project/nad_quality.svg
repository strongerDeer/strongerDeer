<svg xmlns="http://www.w3.org/2000/svg" width="1230" height="500" viewBox="0 0 1230 500" role="img" aria-labelledby="title desc">
  <title id="title">Shop 품질 모니터링 — 배포본 재측정과 회귀 판정, 주간 분석 코멘트</title>
  <desc id="desc">직전 배포 대비 이미지 전송량·번들 크기·Lighthouse 성능 점수·회귀 건수를 재측정하고, 회귀와 측정 노이즈를 구분해 다음 주 우선순위를 자동 코멘트로 정리하는 품질 모니터링 화면.</desc>
  <defs>
    <style>
      .h{font:700 20px Pretendard,Arial,sans-serif;fill:#24212f}
      .sub{font:400 13px Pretendard,Arial,sans-serif;fill:#667085}
      .cardName{font:600 13px Pretendard,Arial,sans-serif;fill:#667085}
      .cardVal{font:800 24px Pretendard,Arial,sans-serif;fill:#24212f}
      .delta{font:700 13px Pretendard,Arial,sans-serif}
      .badge{font:700 12px Pretendard,Arial,sans-serif}
      .section{font:700 15px Pretendard,Arial,sans-serif;fill:#24212f}
      .body{font:400 13px Pretendard,Arial,sans-serif;fill:#344054}
    </style>
  </defs>
  <rect width="1230" height="500" rx="20" fill="#ffffff" stroke="#eef0f4"/>

  <!-- 헤더 -->
  <text x="32" y="44" class="h">Shop 품질 모니터링</text>
  <text x="32" y="68" class="sub">2026-07-13 · production · 1217255c · 직전 2026-07-09 대비</text>
  <g transform="translate(1000 26)"><rect width="200" height="32" rx="16" fill="#fdeceb"/><circle cx="24" cy="16" r="4" fill="#e4342f"/><text x="38" y="21" class="badge" fill="#e4342f">종합 위험 — 번들·SEO</text></g>

  <!-- 지표 카드 4개 -->
  <g transform="translate(32 92)">
    <!-- 이미지 -->
    <g><rect width="278" height="104" rx="14" fill="#fafbfc" stroke="#eef0f4"/><text x="20" y="30" class="cardName">이미지(detail)</text><text x="20" y="66" class="cardVal">109KB</text><text x="20" y="90" class="delta" fill="#667085">직전 대비 0KB</text></g>
    <!-- 번들 -->
    <g transform="translate(298 0)"><rect width="278" height="104" rx="14" fill="#fffbeb" stroke="#fde68a"/><text x="20" y="30" class="cardName">번들</text><text x="20" y="66" class="cardVal">557KB</text><text x="20" y="90" class="delta" fill="#b45309">직전 대비 0KB · 가장 무거움</text></g>
    <!-- Perf -->
    <g transform="translate(596 0)"><rect width="278" height="104" rx="14" fill="#fafbfc" stroke="#eef0f4"/><text x="20" y="30" class="cardName">Lighthouse Perf</text><text x="20" y="66" class="cardVal">70</text><text x="88" y="66" class="delta" fill="#0f7a45">+7점</text><text x="20" y="90" class="delta" fill="#667085">측정 노이즈 범위</text></g>
    <!-- 회귀 -->
    <g transform="translate(894 0)"><rect width="272" height="104" rx="14" fill="#fdeceb" stroke="#fecaca"/><text x="20" y="30" class="cardName">회귀</text><text x="20" y="66" class="cardVal" fill="#e4342f">1건</text><text x="20" y="90" class="delta" fill="#b91c1c">검색 페이지 LCP 악화</text></g>
  </g>

  <!-- 핵심 요약 배너 -->
  <g transform="translate(32 216)">
    <rect width="1166" height="66" rx="14" fill="#f7f5ff" stroke="#ede9fe"/>
    <text x="24" y="30" class="section" fill="#6654c0">핵심</text>
    <text x="24" y="52" class="body">실사용자 체감 속도는 양호(모바일 LCP 약 1.6s). 이미지 전송량이 느는 추세이고, 검색 페이지 랩 측정값이 지난주보다 느려짐.</text>
  </g>

  <!-- 다음 주 우선순위 -->
  <g transform="translate(32 306)">
    <text x="0" y="16" class="section">다음 주 우선순위</text>
    <g transform="translate(0 34)">
      <g><rect width="1166" height="42" rx="10" fill="#fafbfc" stroke="#eef0f4"/><circle cx="26" cy="21" r="11" fill="#eeeaff"/><text x="26" y="26" class="badge" fill="#6654c0" text-anchor="middle">1</text><text x="52" y="26" class="body">홈 이미지 줄이기 — 포맷(WebP/AVIF) 전환과 크기 점검으로 전송량 최적화</text></g>
      <g transform="translate(0 52)"><rect width="1166" height="42" rx="10" fill="#fafbfc" stroke="#eef0f4"/><circle cx="26" cy="21" r="11" fill="#eeeaff"/><text x="26" y="26" class="badge" fill="#6654c0" text-anchor="middle">2</text><text x="52" y="26" class="body">다국어 검색 태그(hreflang) 유효화 — 계속 무효로 잡히는 항목, 한두 줄 수정으로 해결</text></g>
      <g transform="translate(0 104)"><rect width="1166" height="42" rx="10" fill="#fafbfc" stroke="#eef0f4"/><circle cx="26" cy="21" r="11" fill="#eeeaff"/><text x="26" y="26" class="badge" fill="#6654c0" text-anchor="middle">3</text><text x="52" y="26" class="body">검색·목록 페이지 첫 화면 표시 개선 — 초기 렌더 구조(데이터 페칭 후 렌더) 점검</text></g>
    </g>
  </g>
</svg>
