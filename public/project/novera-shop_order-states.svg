<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">주문 상태 15가지와 거절 이력 복귀 규칙</title>
  <desc id="desc">배송 5가지·취소 4가지·반품 6가지의 주문 상태를 정상·취소·반품·거절 그룹으로 분류하고, 취소는 결제완료 상태에서만 가능하며, 거절은 별도 상태가 아니라 이력으로 남고 상품이 원래 상태로 복귀하는 규칙을 단일 판정 모듈로 관리하는 구조.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f5ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0 0l8 4-8 4z" fill="#7967d8"/>
    </marker>
    <marker id="arrowBack" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0l9 4.5-9 4.5z" fill="#e4342f"/>
    </marker>
    <style>
      .title{font:700 24px Pretendard,Arial,sans-serif;fill:#24212f}
      .group{font:700 15px Pretendard,Arial,sans-serif;fill:#24212f}
      .state{font:600 13px Pretendard,Arial,sans-serif;fill:#344054}
      .note{font:400 13px Pretendard,Arial,sans-serif;fill:#667085}
      .badge{font:700 12px Pretendard,Arial,sans-serif}
      .flow{stroke:#7967d8;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .reject{stroke:#e4342f;stroke-width:2.5;stroke-dasharray:6 5;fill:none;marker-end:url(#arrowBack)}
    </style>
  </defs>
  <rect width="1200" height="640" rx="28" fill="url(#bg)"/>
  <text x="55" y="58" class="title">상태 15가지를 4개 그룹으로 — 철회·거절은 상태가 아니라 이력이다</text>
  <text x="55" y="86" class="note">취소·반품·구매확정·배송조회 가능 여부를 화면이 아니라 단일 판정 모듈에서 결정 → 정책이 바뀌면 모듈만 고친다</text>

  <!-- 정상(배송) 그룹 5 -->
  <g transform="translate(55 120)">
    <rect width="1090" height="118" rx="18" fill="#fff" stroke="#e4e7ec"/>
    <rect x="20" y="20" width="90" height="26" rx="13" fill="#eafaf1"/><text x="65" y="38" class="badge" fill="#0f7a45" text-anchor="middle">정상 · 배송 5</text>
    <!-- states -->
    <g transform="translate(20 62)">
      <rect width="150" height="40" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/><text x="75" y="25" class="state" text-anchor="middle">결제완료</text>
      <rect x="188" width="150" height="40" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/><text x="263" y="25" class="state" text-anchor="middle">상품준비</text>
      <rect x="376" width="150" height="40" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/><text x="451" y="25" class="state" text-anchor="middle">배송중</text>
      <rect x="564" width="150" height="40" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/><text x="639" y="25" class="state" text-anchor="middle">배송완료</text>
      <rect x="752" width="150" height="40" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/><text x="827" y="25" class="state" text-anchor="middle">구매확정</text>
      <!-- inline arrows -->
      <path class="flow" d="M152 20h32"/><path class="flow" d="M340 20h32"/><path class="flow" d="M528 20h32"/><path class="flow" d="M716 20h32"/>
    </g>
    <text x="925" y="88" class="note">취소 가능 = 결제완료 상태만</text>
  </g>

  <!-- 취소 그룹 4 -->
  <g transform="translate(55 268)">
    <rect width="535" height="150" rx="18" fill="#fff" stroke="#e4e7ec"/>
    <rect x="20" y="20" width="80" height="26" rx="13" fill="#eeeaff"/><text x="60" y="38" class="badge" fill="#6654c0" text-anchor="middle">취소 4</text>
    <g transform="translate(20 62)">
      <rect width="140" height="38" rx="10" fill="#f7f5ff" stroke="#ded8ff"/><text x="70" y="24" class="state" text-anchor="middle">취소요청</text>
      <rect x="178" width="140" height="38" rx="10" fill="#f7f5ff" stroke="#ded8ff"/><text x="248" y="24" class="state" text-anchor="middle">취소처리중</text>
      <rect x="356" width="140" height="38" rx="10" fill="#f7f5ff" stroke="#ded8ff"/><text x="426" y="24" class="state" text-anchor="middle">취소완료</text>
      <path class="flow" d="M142 19h30"/><path class="flow" d="M320 19h30"/>
    </g>
    <text x="20" y="132" class="note">취소철회(사용자)·취소거절(운영) 시 → 원래 상태로 복귀(아래)</text>
  </g>

  <!-- 반품 그룹 6 -->
  <g transform="translate(610 268)">
    <rect width="535" height="150" rx="18" fill="#fff" stroke="#e4e7ec"/>
    <rect x="20" y="20" width="80" height="26" rx="13" fill="#eeeaff"/><text x="60" y="38" class="badge" fill="#6654c0" text-anchor="middle">반품 6</text>
    <g transform="translate(20 62)">
      <rect width="118" height="38" rx="10" fill="#f7f5ff" stroke="#ded8ff"/><text x="59" y="24" class="state" text-anchor="middle">반품요청</text>
      <rect x="150" width="118" height="38" rx="10" fill="#f7f5ff" stroke="#ded8ff"/><text x="209" y="24" class="state" text-anchor="middle">수거중</text>
      <rect x="300" width="118" height="38" rx="10" fill="#f7f5ff" stroke="#ded8ff"/><text x="359" y="24" class="state" text-anchor="middle">검수</text>
      <rect x="377" y="52" width="118" height="38" rx="10" fill="#f7f5ff" stroke="#ded8ff"/><text x="436" y="76" class="state" text-anchor="middle">환불완료</text>
      <path class="flow" d="M120 19h28"/><path class="flow" d="M270 19h28"/><path class="flow" d="M418 30c16 8 18 18 18 20"/>
    </g>
    <text x="20" y="132" class="note">반품철회·반품거절 시 → 원래 상태로 복귀(아래)</text>
  </g>

  <!-- 철회·거절 = 요청은 상태를 되돌린다 -->
  <g transform="translate(55 448)">
    <rect width="1090" height="150" rx="18" fill="#fff" stroke="#fde0df"/>
    <rect x="20" y="18" width="180" height="26" rx="13" fill="#fdeceb"/><text x="110" y="36" class="badge" fill="#e4342f" text-anchor="middle">철회·거절 = 이력</text>
    <!-- 좌측 설명: 폭 x20~500 안에서 (우측 도식과 겹치지 않도록) -->
    <text x="20" y="72" class="group">철회·거절은 별도 상태가 아니다</text>
    <text x="20" y="98" class="note">둘 다 상품을 원래 상태로 되돌린다. 철회는</text>
    <text x="20" y="118" class="note">사용자가 스스로 요청을 무르는 것이라 사유가</text>
    <text x="20" y="138" class="note">없고, 운영자 거절만 거절 사유가 이력으로 남는다.</text>

    <!-- 철회(사용자) 경로 — 사유 없음 -->
    <g transform="translate(560 54)">
      <rect width="140" height="40" rx="10" fill="#fff7ed" stroke="#fed7aa"/><text x="70" y="25" class="state" text-anchor="middle" fill="#b45309">취소·반품 철회</text>
      <rect x="330" width="130" height="40" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/><text x="395" y="25" class="state" text-anchor="middle">원래 상태 복귀</text>
      <path class="reject" style="stroke:#f59e0b" d="M142 20h180"/>
      <text x="236" y="12" class="note" text-anchor="middle" fill="#b45309">사용자가 철회 · 사유 없음</text>
    </g>
    <!-- 거절(운영) 경로 — 거절 사유가 이력으로 남음 -->
    <g transform="translate(560 104)">
      <rect width="140" height="40" rx="10" fill="#fdeceb" stroke="#fde0df"/><text x="70" y="25" class="state" text-anchor="middle" fill="#e4342f">취소·반품 거절</text>
      <rect x="330" width="130" height="40" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/><text x="395" y="25" class="state" text-anchor="middle">원래 상태 복귀</text>
      <path class="reject" d="M142 20h180"/>
      <text x="236" y="12" class="note" text-anchor="middle" fill="#e4342f">운영자가 거절</text>
      <!-- 거절 사유 이력 배지 -->
      <g transform="translate(474 8)"><rect width="118" height="24" rx="12" fill="#f7f5ff" stroke="#ded8ff"/><text x="59" y="16" class="note" text-anchor="middle" fill="#6654c0">+ 거절 사유</text></g>
      <path class="flow" d="M462 20h10"/>
    </g>
  </g>
</svg>
