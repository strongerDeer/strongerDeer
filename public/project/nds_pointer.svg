<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">모달 닫힘 판정 — pointerdown과 pointerup 위치 비교</title>
  <desc id="desc">누른 지점과 놓은 지점이 모두 배경일 때만 닫고, 모달 내용에서 시작했거나 드래그로 배경에 도달한 경우는 열린 상태를 유지하는 판정 규칙</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f5ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <style>
      .title{font:700 25px Pretendard,Arial,sans-serif;fill:#24212f}.label{font:700 17px Pretendard,Arial,sans-serif;fill:#24212f}.sub{font:400 13px Pretendard,Arial,sans-serif;fill:#667085}.code{font:600 12px 'SF Mono',Menlo,monospace;fill:#6654c0}.close{font:700 15px Pretendard,Arial,sans-serif;fill:#e4342f}.keep{font:700 15px Pretendard,Arial,sans-serif;fill:#0f9d58}
    </style>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="60" y="62" class="title">누른 곳·놓은 곳이 모두 배경일 때만 닫는다</text>
  <text x="60" y="92" class="sub">click(놓은 위치)만 보던 판정을 pointerdown·pointerup 두 지점 비교로 바꿔, 드래그로 인한 오닫힘을 제거</text>

  <!-- Case 1: 둘 다 배경 → 닫힘 -->
  <g transform="translate(55 130)">
    <rect width="345" height="330" rx="20" fill="#fff" stroke="#e4e7ec"/>
    <!-- backdrop 영역 -->
    <rect x="20" y="20" width="305" height="230" rx="14" fill="#f3f4f6"/>
    <text x="34" y="44" class="sub">backdrop</text>
    <!-- modal -->
    <rect x="95" y="78" width="155" height="115" rx="12" fill="#fff" stroke="#ded8ff" stroke-width="2"/>
    <text x="130" y="142" class="sub">modal</text>
    <!-- down/up points on backdrop -->
    <circle cx="52" cy="210" r="9" fill="#7967d8"/><text x="40" y="238" class="code">down</text>
    <circle cx="292" cy="210" r="9" fill="#7967d8"/><text x="280" y="238" class="code">up</text>
    <path d="M61 210h222" stroke="#7967d8" stroke-width="2" stroke-dasharray="4 5" fill="none"/>
    <text x="24" y="288" class="label">둘 다 배경에서 발생</text>
    <text x="24" y="314" class="close">→ 닫힘</text>
  </g>

  <!-- Case 2: 내용에서 시작 → 유지 -->
  <g transform="translate(428 130)">
    <rect width="345" height="330" rx="20" fill="#fff" stroke="#e4e7ec"/>
    <rect x="20" y="20" width="305" height="230" rx="14" fill="#f3f4f6"/>
    <text x="34" y="44" class="sub">backdrop</text>
    <rect x="95" y="78" width="155" height="115" rx="12" fill="#fff" stroke="#ded8ff" stroke-width="2"/>
    <text x="130" y="142" class="sub">modal</text>
    <!-- down inside modal, up on backdrop -->
    <circle cx="172" cy="135" r="9" fill="#7967d8"/><text x="160" y="120" class="code">down</text>
    <circle cx="292" cy="210" r="9" fill="#7967d8"/><text x="280" y="238" class="code">up</text>
    <path d="M178 141l108 63" stroke="#7967d8" stroke-width="2" stroke-dasharray="4 5" fill="none"/>
    <text x="24" y="288" class="label">모달 내용에서 시작</text>
    <text x="24" y="314" class="keep">→ 유지</text>
  </g>

  <!-- Case 3: 배경에서 시작해 드래그로 내용 → 유지 -->
  <g transform="translate(801 130)">
    <rect width="345" height="330" rx="20" fill="#fff" stroke="#e4e7ec"/>
    <rect x="20" y="20" width="305" height="230" rx="14" fill="#f3f4f6"/>
    <text x="34" y="44" class="sub">backdrop</text>
    <rect x="95" y="78" width="155" height="115" rx="12" fill="#fff" stroke="#ded8ff" stroke-width="2"/>
    <text x="130" y="142" class="sub">modal</text>
    <!-- 보조 포인터(주 입력 아님)는 제외 -->
    <circle cx="52" cy="210" r="9" fill="#c7bff0"/><text x="40" y="238" class="code">보조 down</text>
    <circle cx="292" cy="60" r="9" fill="#c7bff0"/><text x="252" y="52" class="code">up</text>
    <path d="M61 208L285 66" stroke="#c7bff0" stroke-width="2" stroke-dasharray="4 5" fill="none"/>
    <text x="24" y="288" class="label">주 입력이 아닌 포인터</text>
    <text x="24" y="314" class="keep">→ 제외 · 유지</text>
  </g>
</svg>
